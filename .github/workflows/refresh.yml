name: Refresh Known Issues

on:
  schedule:
    # Runs every day at 06:00 UTC (good morning refresh)
    - cron: "0 6 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium --with-deps

      - name: Fetch issues and build report
        run: python fetch_issues.py --output index.html

      - name: Commit and push updated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "chore: refresh known issues report [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
